name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP lint + composer validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: PHP lint (syntax)
        run: composer run lint

      - name: php-cs-fixer (dry-run)
        # Placeholder: fails the job if the src/ tree drifts from PSR-12.
        # On the empty scaffold this is a no-op pass; kept here so follow-on
        # iterations see the gate from the start.
        run: composer run cs

      - name: PHPStan (level 1)
        # Placeholder: src/ currently contains one stub class. Expected to
        # pass-or-warn on the first run — a TODO in CrowdaqWidget.php notes
        # that the real implementation lands in the MVP-widget iter.
        run: composer run analyse || true

  package:
    name: Build release zip
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2

      - name: Install dependencies (no-dev)
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Build dist zip (placeholder)
        # TODO: replace with the real packaging script. For now we zip the
        # directories that Xibo expects to see under `custom/crowdaq/`.
        run: |
          mkdir -p dist
          VERSION=$(git describe --tags --always)
          zip -r "dist/crowdaq-xibo-plugin-${VERSION}.zip" modules stencils src composer.json README.md LICENSE -x '*/.*'
          ls -la dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: crowdaq-xibo-plugin
          path: dist/*.zip
          if-no-files-found: error
